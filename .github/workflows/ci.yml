name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore InfiniteScroll.sln

      - name: Build
        run: dotnet build InfiniteScroll.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish InfiniteScroll.WPF/InfiniteScroll.WPF.csproj --configuration Release --no-build --output ./publish
